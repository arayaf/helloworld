{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Edit Profile - {{ user.full_name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-12 mb-4">
            <h1 class="display-4 fw-bold text-dark">
                <i class="fas fa-edit me-3"></i>Edit Profile
            </h1>
        </div>
    </div>
    
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card card-crimson">
                <div class="card-header">
                    <h5 class="fw-bold mb-0">
                        <i class="fas fa-user-edit me-2"></i>Update Your Information
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-crimson">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                            <a href="{% url 'users:profile' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
